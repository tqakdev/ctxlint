name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Smoke-test the packed CLI (npx flow)
        run: |
          pnpm pack
          WORKDIR="$(mktemp -d)"
          cp ctxaudit-*.tgz "$WORKDIR/"
          cp -R test/fixtures/messy-repo "$WORKDIR/target"
          cd "$WORKDIR"
          npm init -y > /dev/null
          npm install --no-fund --no-audit ./ctxaudit-*.tgz > /dev/null
          npx ctxaudit scan target --format json --output report.json
          node -e "const r=require('./report.json'); if (typeof r.score.total !== 'number') process.exit(1); console.log('packed CLI OK — score', r.score.total)"
